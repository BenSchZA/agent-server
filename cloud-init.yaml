#cloud-config

package_update: true
package_upgrade: true

packages:
  - wireguard
  - fail2ban
  - ufw
  - curl
  - jq
  - unattended-upgrades

users:
  - name: deploy
    groups: docker
    shell: /bin/bash
    sudo: ALL=(ALL) NOPASSWD:ALL
    lock_passwd: true

write_files:
  - path: /etc/wireguard/wg0.conf
    permissions: "0600"
    content: |
      [Interface]
      PrivateKey = ${wg_server_private_key}
      Address = ${wg_server_address}
      ListenPort = 51820

      [Peer]
      PublicKey = ${wg_client_public_key}
      AllowedIPs = ${wg_client_allowed_ip}

  - path: /etc/fail2ban/jail.local
    content: |
      [DEFAULT]
      bantime = 3600
      findtime = 600
      maxretry = 3
      backend = systemd

      [sshd]
      enabled = true
      port = ssh
      filter = sshd
      maxretry = 3

  - path: /etc/ssh/sshd_config.d/99-hardened.conf
    content: |
      PermitRootLogin no
      PasswordAuthentication no
      PubkeyAuthentication yes
      X11Forwarding no
      AllowTcpForwarding no
      MaxAuthTries 3
      ListenAddress ${wg_server_address}

  - path: /home/deploy/docker-compose.yaml
    permissions: "0644"
    content: |
      services:
        cloudflared:
          image: cloudflare/cloudflared:latest
          container_name: cloudflared
          restart: unless-stopped
          command: tunnel run
          environment:
            - TUNNEL_TOKEN=$${CLOUDFLARE_TUNNEL_TOKEN}
          env_file:
            - .env
          network_mode: host

  - path: /home/deploy/.env.example
    permissions: "0644"
    content: |
      CLOUDFLARE_TUNNEL_TOKEN=your-cloudflare-tunnel-token

  - path: /etc/sysctl.d/99-wireguard.conf
    content: |
      net.ipv4.ip_forward = 1

runcmd:
  # Enable IP forwarding
  - sysctl -p /etc/sysctl.d/99-wireguard.conf

  # Start WireGuard
  - systemctl enable wg-quick@wg0
  - systemctl start wg-quick@wg0

  # Configure UFW - deny all inbound, allow WireGuard only
  - ufw default deny incoming
  - ufw default allow outgoing
  - ufw allow 51820/udp
  - ufw --force enable

  # Install Docker via official script
  - curl -fsSL https://get.docker.com | sh

  # Add deploy user to docker group (in case cloud-init order differs)
  - usermod -aG docker deploy

  # Enable and start Docker
  - systemctl enable docker
  - systemctl start docker

  # Install docker compose plugin
  - apt-get install -y docker-compose-plugin

  # Fix ownership of deploy home
  - chown -R deploy:deploy /home/deploy

  # Start fail2ban
  - systemctl enable fail2ban
  - systemctl start fail2ban

  # Restart SSH to bind only to WireGuard interface
  - systemctl restart sshd

  # Enable automatic security updates
  - systemctl enable unattended-upgrades
  - systemctl start unattended-upgrades
